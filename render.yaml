# Render Blueprint for SCI Risk System
# Deploy: https://render.com/deploy?repo=https://github.com/wanghongfeng/sci-risk

services:
  # =============================================================================
  # Algorithm Service (Tariff & Scenario)
  # =============================================================================
  - type: web
    name: sci-risk-algorithm
    runtime: docker
    region: oregon
    dockerfilePath: ./algorithms/risk-algorithm-service/Dockerfile
    port: 5000
    healthCheckPath: /health
    envVars:
      - key: BACKEND_URL
        value: https://sci-risk-backend.onrender.com
      - key: ALGORITHM_PORT
        value: "5000"
      - key: DEBUG
        value: "false"

  # =============================================================================
  # ML Algorithm Service
  # =============================================================================
  - type: web
    name: sci-risk-ml-algorithm
    runtime: docker
    region: oregon
    dockerfilePath: ./algorithms/risk-ml-algorithm/Dockerfile
    port: 5001
    healthCheckPath: /health
    envVars:
      - key: BACKEND_URL
        value: https://sci-risk-backend.onrender.com
      - key: SERVICE_PORT
        value: "5001"
      - key: DEBUG
        value: "false"
