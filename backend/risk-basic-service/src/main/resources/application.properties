server.port=${SERVER_PORT:8000}
spring.application.name=risk-backend

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.jackson.default-property-inclusion=non_null

# Database Configuration - 使用环境变量，参考 .env.example
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD}

# Callback URL (use service name in Docker, localhost in local dev)
app.callback-url=${CALLBACK_URL:http://localhost:8080}

# Algorithm service endpoints
app.algorithm.tariff-endpoint=${ALGORITHM_TARIFF_ENDPOINT:http://localhost:5000/tariff}
app.algorithm.scenario-endpoint=${ALGORITHM_SCENARIO_ENDPOINT:http://localhost:5000/scenario}
app.algorithm.ml-endpoint=${ALGORITHM_ML_ENDPOINT:http://localhost:5001/ml}
